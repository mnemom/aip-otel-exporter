version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "pip"
    directory: "/packages/python"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
