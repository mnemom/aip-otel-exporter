name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions: {}
jobs:
  typescript:
    permissions:
      contents: read
    name: TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npm run lint --workspace=packages/typescript

      - name: Test
        run: npm run test:coverage --workspace=packages/typescript

      - name: Upload coverage
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/typescript/coverage
          flags: typescript
          fail_ci_if_error: false

      - name: Benchmark
        run: npm run bench --workspace=packages/typescript

  python:
    permissions:
      contents: read
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          cd packages/python
          pip install -e ".[dev]"

      - name: Lint
        run: |
          cd packages/python
          ruff check src/ tests/

      - name: Type check
        if: matrix.python-version == '3.12'
        run: |
          cd packages/python
          mypy src/

      - name: Test
        run: |
          cd packages/python
          python -m pytest tests/ -v

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: packages/python/coverage.xml
          flags: python
          fail_ci_if_error: false

  # npm publish moved to publish.yml's release-triggered path (ADR-020).
  # Inline publish on every push to main was using Node 20 + empty
  # NODE_AUTH_TOKEN, which causes E404 against npm's Trusted Publisher
  # endpoint (npm <11 silently sends an empty bearer token). The canonical
  # reusable at mnemom/.github npm-publish.yml uses Node 24 + proper OIDC
  # fallback. Cut a GitHub release (e.g. v0.8.0) to fire the new path.

  # PyPI publish moved to publish.yml's release-triggered path alongside
  # publish-npm. Both registries now flow through the same workflow file
  # with consistent validate → test → publish gates. Cut a `v<version>`
  # GitHub release to fire both publishes; the `Check if version exists`
  # step in publish.yml's publish-pypi job preserves the idempotency
  # behavior that lived inline here. Note: PyPI's Trusted Publisher config
  # must trust the publish.yml workflow (not ci.yml).

  dispatch-deploy:
    permissions:
      contents: read
    name: Trigger Deploy
    needs: [typescript, python]
    if: >-
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom

      - name: Commit subject
        id: commit
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: printf 'title=%s\n' "${HEAD_COMMIT_MESSAGE%%$'\n'*}" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: mnemom/deploy
          event-type: deploy
          client-payload: >-
            {
              "repo": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "commit_title": ${{ toJSON(steps.commit.outputs.title) }},
              "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
            }
