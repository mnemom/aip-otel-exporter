name: Publish

# Thin caller for the canonical npm publish recipe — see ADR-020.
# All Node version, registry-url, OIDC, provenance, and SBOM logic lives in
# mnemom/.github/.github/workflows/npm-publish.yml. To change the recipe,
# edit the canonical workflow there; do not re-add steps inline here.
#
# This repo publishes a single npm package (@mnemom/aip-otel-exporter) from
# packages/typescript via the orchestrator dispatch path. No release-event
# trigger today (cleanup item: consider release-triggered publishing so SBOMs
# attach to GitHub Releases).

on:
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: false
        type: string
        default: "packages/typescript"


permissions: {}
jobs:
  publish:
    # contents: write is over-granted relative to what dispatch-publish does
    # (the `gh release upload` step in the reusable workflow is gated on
    # `event_name == 'release'` and never runs here). But GitHub validates
    # caller permissions against the called workflow's declared permissions
    # at workflow load time, before any `if:` is evaluated.
    permissions:
      contents: write
      id-token: write
    # mnemom/.github @ scale/step-29-cleanup merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@e9906593dcd1f0d2d642b92e46818bda1cc46e24
    with:
      npm-directory: ${{ inputs.npm-directory || 'packages/typescript' }}
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      tag: latest
      attach-sbom-to-release: false   # dispatch path has no release to attach to
